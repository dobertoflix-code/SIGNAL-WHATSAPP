<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIYAL — Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10131A; --surface:#1A2029; --surface-2:#222A36;
    --line:rgba(255,255,255,0.09); --text:#F1EFEA; --muted:#8A90A2; --safe:#3ECF8E; --danger:#FF5C5C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:'Inter', sans-serif; display:flex; justify-content:center; padding:20px 16px 60px;
  }
  .shell{ width:100%; max-width:460px; }
  h1{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:24px; margin:0 0 20px; }

  /* --- gate --- */
  #gate{ display:flex; flex-direction:column; gap:16px; margin-top:18vh; }
  #gate .card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:24px; display:flex; flex-direction:column; gap:14px; }
  #gate input{
    background:var(--surface-2); border:1px solid var(--line); color:var(--text);
    font-family:'IBM Plex Mono', monospace; font-size:15px; padding:13px 14px; border-radius:10px; width:100%;
  }
  #gate button{
    appearance:none; border:none; cursor:pointer; background:var(--text); color:#10131A;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:15px; padding:13px; border-radius:10px;
  }
  #gate-error{ color:var(--danger); font-size:13px; display:none; }

  /* --- dashboard --- */
  #dash{ display:none; }
  #dash iframe{ width:100%; height:80vh; border:none; border-radius:14px; background:var(--surface); }
  .top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .logout{ background:none; border:none; color:var(--muted); font-family:'IBM Plex Mono', monospace; font-size:12px; cursor:pointer; }
</style>
</head>
<body>
<div class="shell">

  <!-- MODPAS -->
  <div id="gate">
    <h1>SIYAL · Admin</h1>
    <div class="card">
      <input type="password" id="pass-input" placeholder="Modpas" autocomplete="off">
      <button onclick="tryLogin()">Antre</button>
      <div id="gate-error">Modpas la pa bon.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <div class="top-row">
      <h1>SIYAL · Statistik</h1>
      <button class="logout" onclick="logout()">Dekonekte</button>
    </div>
    <!-- Lyen Plausible la ranpli dinamikman apre login reyisi (soti nan /api/admin-stats), li pa janm ekri isit la -->
    <iframe id="stats-frame"></iframe>
  </div>

</div>
<script>
  const gateEl = document.getElementById('gate');
  const dashEl = document.getElementById('dash');
  const errEl = document.getElementById('gate-error');
  const iframeEl = document.getElementById('stats-frame');

  async function showDash(){
    const r = await fetch('/api/admin-stats');
    if(!r.ok) return false;
    const data = await r.json();
    iframeEl.src = data.shareUrl;
    gateEl.style.display = 'none';
    dashEl.style.display = 'block';
    return true;
  }

  async function tryLogin(){
    const val = document.getElementById('pass-input').value;
    const r = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    });
    if(r.ok){
      errEl.style.display = 'none';
      await showDash();
    } else {
      errEl.style.display = 'block';
    }
  }

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if(e.key === 'Enter') tryLogin();
  });

  async function logout(){
    await fetch('/api/admin-logout', { method: 'POST' });
    dashEl.style.display = 'none';
    gateEl.style.display = 'flex';
    document.getElementById('pass-input').value = '';
  }

  // Verifye si gen yon sesyon valid deja (cookie sèvè a mete) — si genyen, antre dirèk
  showDash();
</script>
</body>
</html>
