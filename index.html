<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SIYAL — WhatsApp Ban-Risk Check</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10131A">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --bg:#10131A;
    --surface:#1A2029;
    --surface-2:#222A36;
    --line:rgba(255,255,255,0.09);
    --text:#F1EFEA;
    --muted:#8A90A2;
    --safe:#3ECF8E;
    --caution:#F2C46B;
    --risk:#FF8A3D;
    --danger:#FF5C5C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(62,207,142,0.10), transparent 40%),
      radial-gradient(circle at 85% 110%, rgba(255,92,92,0.08), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    display:flex;
    justify-content:center;
    padding:20px 16px 60px;
  }
  .shell{ width:100%; max-width:460px; }

  .lang-switch{
    display:flex; justify-content:flex-end; gap:6px; margin-bottom:18px;
  }
  .lang-btn{
    appearance:none; cursor:pointer;
    background:var(--surface); border:1px solid var(--line); color:var(--muted);
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.06em;
    padding:7px 11px; border-radius:8px; transition:all .15s ease;
  }
  .lang-btn.active{ background:var(--text); color:#10131A; border-color:var(--text); }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.16em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:30px;
    line-height:1.15;
    margin:0 0 14px;
  }
  .lede{ color:var(--muted); font-size:15px; line-height:1.55; margin-bottom:26px; }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:18px;
    padding:24px;
  }

  .signal-bars{ display:flex; align-items:flex-end; gap:5px; }
  .signal-bars .bar{
    width:9px;
    background:var(--line);
    border-radius:3px;
    transition:background .5s ease, transform .5s ease;
  }
  .signal-bars .bar:nth-child(1){ height:10px; }
  .signal-bars .bar:nth-child(2){ height:17px; }
  .signal-bars .bar:nth-child(3){ height:24px; }
  .signal-bars .bar:nth-child(4){ height:31px; }
  .signal-bars .bar:nth-child(5){ height:38px; }
  .signal-bars.big .bar:nth-child(1){ height:20px; }
  .signal-bars.big .bar:nth-child(2){ height:34px; }
  .signal-bars.big .bar:nth-child(3){ height:48px; }
  .signal-bars.big .bar:nth-child(4){ height:62px; }
  .signal-bars.big .bar:nth-child(5){ height:76px; }
  .signal-bars.big .bar{ width:14px; border-radius:4px; }
  .bar.lit-safe{ background:var(--safe); }
  .bar.lit-caution{ background:var(--caution); }
  .bar.lit-risk{ background:var(--risk); }
  .bar.lit-danger{ background:var(--danger); }

  #screen-intro .card{ display:flex; flex-direction:column; gap:22px; align-items:flex-start; }
  .start-btn{
    appearance:none; border:none; cursor:pointer;
    background:var(--text); color:#10131A;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:16px;
    padding:16px 22px; border-radius:12px; width:100%;
    transition:transform .15s ease, opacity .15s ease;
  }
  .start-btn:active{ transform:scale(0.98); opacity:0.9; }
  .fine{ font-size:12.5px; color:var(--muted); line-height:1.5; }

  #screen-quiz{ display:none; }
  .progress-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .progress-label{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); letter-spacing:0.05em; }
  .track{ height:3px; background:var(--line); border-radius:2px; margin-bottom:24px; overflow:hidden; }
  .track-fill{ height:100%; background:var(--safe); border-radius:2px; transition:width .35s ease; }
  .q-text{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:20px; line-height:1.35; margin-bottom:20px; }
  .options{ display:flex; flex-direction:column; gap:10px; }
  .opt{
    text-align:left;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter', sans-serif; font-size:14.5px; line-height:1.4;
    padding:15px 16px; border-radius:12px; cursor:pointer;
    transition:border-color .15s ease, transform .1s ease, background .15s ease;
  }
  .opt:active{ transform:scale(0.98); }
  .opt:hover{ border-color:rgba(255,255,255,0.25); background:#28313F; }
  .back-link{
    margin-top:20px; background:none; border:none; color:var(--muted);
    font-family:'Inter'; font-size:13px; cursor:pointer; padding:8px 0;
  }

  #screen-result{ display:none; }
  .result-top{ display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; padding:8px 4px 26px; }
  .result-title{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:26px; }
  .result-score{ font-family:'IBM Plex Mono', monospace; font-size:14px; color:var(--muted); }
  .result-desc{ color:var(--muted); font-size:14.5px; line-height:1.55; max-width:360px; }
  .section-label{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--muted); margin:26px 0 12px;
  }
  .tip{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--surface-2); border:1px solid var(--line);
    border-radius:12px; padding:14px 15px; margin-bottom:10px; font-size:14px; line-height:1.5;
  }
  .tip .dot{ flex-shrink:0; margin-top:5px; width:7px; height:7px; border-radius:50%; }
  .ok-msg{ color:var(--safe); font-size:14px; }
  .restart-btn{
    width:100%; margin-top:28px; padding:15px; border-radius:12px;
    background:transparent; border:1px solid var(--line); color:var(--text);
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:15px; cursor:pointer;
  }
  footer{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:30px; line-height:1.6; }

  /* ---------- entry loader ---------- */
  #loader{
    position:fixed; inset:0; z-index:999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
    background:
      radial-gradient(circle at 50% 40%, rgba(62,207,142,0.08), transparent 55%),
      var(--bg);
    animation: loaderExit 2.6s ease forwards;
  }
  .loader-radar{ position:relative; width:120px; height:76px; display:flex; align-items:flex-end; justify-content:center; }
  .ping-ring{
    position:absolute; left:50%; bottom:0; width:14px; height:14px; border-radius:50%;
    border:1px solid var(--safe); transform:translate(-50%, 0) scale(0.3);
    opacity:0; animation:ping 1.6s ease-out infinite;
  }
  .ping-ring.d2{ animation-delay:0.8s; }
  .loader-bars{ position:relative; display:flex; align-items:flex-end; gap:6px; z-index:1; }
  .loader-bars .lbar{
    width:11px; border-radius:3px; background:var(--line);
    transform-origin:bottom; transform:scaleY(0);
    animation:barSignal 0.9s cubic-bezier(.2,.9,.3,1.2) forwards;
  }
  .loader-bars .lbar:nth-child(1){ height:16px; animation-delay:0.05s; }
  .loader-bars .lbar:nth-child(2){ height:28px; animation-delay:0.13s; }
  .loader-bars .lbar:nth-child(3){ height:40px; animation-delay:0.21s; }
  .loader-bars .lbar:nth-child(4){ height:52px; animation-delay:0.29s; }
  .loader-bars .lbar:nth-child(5){ height:64px; animation-delay:0.37s; }
  .loader-word{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:28px;
    letter-spacing:0.35em; padding-left:0.35em; color:var(--text);
    opacity:0; transform:translateY(8px);
    animation:wordReveal 0.7s ease forwards; animation-delay:0.95s;
  }
  .loader-tag{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted);
    letter-spacing:0.08em; opacity:0;
    animation:wordReveal 0.6s ease forwards; animation-delay:1.3s;
  }
  @keyframes barSignal{
    0%{ transform:scaleY(0); background:var(--line); }
    55%{ transform:scaleY(1); background:var(--line); }
    100%{ transform:scaleY(1); background:var(--safe); }
  }
  @keyframes ping{
    0%{ transform:translate(-50%,0) scale(0.3); opacity:0.55; }
    100%{ transform:translate(-50%,0) scale(6); opacity:0; }
  }
  @keyframes wordReveal{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes loaderExit{
    0%, 76%{ opacity:1; transform:translateY(0); visibility:visible; }
    100%{ opacity:0; transform:translateY(-18px); visibility:hidden; }
  }
  @media (prefers-reduced-motion: reduce){
    #loader{ display:none !important; }
  }

  .install-btn{
    display:none;
    width:100%; margin-top:12px; padding:14px;
    border-radius:12px; border:1px solid var(--line); background:var(--surface-2);
    color:var(--text); font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14.5px;
    cursor:pointer; align-items:center; justify-content:center; gap:8px;
  }
  .site-credit{
    text-align:center; margin-top:34px; opacity:0.8;
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.06em; color:var(--muted);
  }
  .site-credit strong{ color:var(--text); font-weight:600; letter-spacing:0.08em; }
</style>
</head>

<div id="loader" aria-hidden="true">

    </div>
  </div>

  <div class="loader-tag">K ap chèche siyal la…</div>
</div>

<div class="shell">

  <div class="lang-switch">
    <button class="lang-btn" data-lang="kr">KR</button>
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>

  <!-- INTRO -->

    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz">

      <span class="progress-label" id="progress-label"></span>

    <div class="card">
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
    <button class="back-link" id="back-btn" onclick="goBack()"></button>
  </div>

  <!-- RESULT -->
  <div id="screen-result">

        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>

    <div id="tips-block">
      <div class="section-label" id="tips-label"></div>
      <div id="tips-list"></div>
    </div>

    <button class="restart-btn" id="restart-btn" onclick="restart()"></button>
    <footer id="t-footer"></footer>
  </div>

  <div class="site-credit">SIYAL · Fèt pa <strong>DOBERTO MR LIT TECH</strong></div>

</div>

/* ---------- state ---------- */
let currentLang = 'kr';
let current = 0;
let answers = []; // { qIndex, pts }
let activeScreen = 'intro'; // intro | quiz | result

function setLang(lang){
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  renderIntro();
  if(activeScreen === 'quiz') renderQuestion();
  if(activeScreen === 'result') renderResults();
}

function renderIntro(){
  const s = STRINGS[currentLang];
  document.getElementById('t-eyebrow').textContent = s.eyebrow;
  document.getElementById('t-title').textContent = s.title;
  document.getElementById('t-lede').textContent = s.lede;
  document.getElementById('t-start-btn').textContent = s.startBtn;
  document.getElementById('install-btn').textContent = s.installBtn;
  document.getElementById('t-fine').textContent = s.fine;
}

function startQuiz(){
  current = 0; answers = [];
  activeScreen = 'quiz';
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion(){
  const s = STRINGS[currentLang];
  const q = QUESTIONS[current];
  document.getElementById('progress-label').textContent = s.questionLabel(current+1);
  document.getElementById('track-fill').style.width = `${((current)/8)*100 + 12.5}%`;
  document.getElementById('q-text').textContent = q.text[currentLang];
  document.getElementById('back-btn').textContent = s.backLink;
  document.getElementById('back-btn').style.visibility = current === 0 ? 'hidden' : 'visible';

  const optsEl = document.getElementById('q-options');
  optsEl.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt.label[currentLang];
    btn.onclick = () => selectOption(opt.pts);
    optsEl.appendChild(btn);
  });

  paintProgressBars(document.getElementById('quiz-bars'), current, 8);
}

function paintProgressBars(container, doneCount, total){
  const bars = container.querySelectorAll('.bar');
  const litCount = Math.round((doneCount/total) * 5);
  bars.forEach((b, i) => {
    b.className = 'bar' + (i < litCount ? ' lit-safe' : '');
  });
}

function selectOption(pts){
  answers[current] = { qIndex: current, pts };
  current++;
  if(current < QUESTIONS.length){
    renderQuestion();
  } else {
    activeScreen = 'result';
    document.getElementById('screen-quiz').style.display = 'none';
    document.getElementById('screen-result').style.display = 'block';
    renderResults();
  }
}

function goBack(){
  if(current === 0) return;
  current--;
  renderQuestion();
}

function riskClass(percent){
  if(percent <= 25) return 'safe';
  if(percent <= 50) return 'caution';
  if(percent <= 75) return 'risk';
  return 'danger';
}

function renderResults(){
  const s = STRINGS[currentLang];
  const total = answers.reduce((sum,a) => sum + a.pts, 0);
  const percent = Math.round((total / 24) * 100);
  const cls = riskClass(percent);

  document.getElementById('result-title').textContent = s.titles[cls];
  document.getElementById('result-title').style.color = `var(--${cls})`;
  document.getElementById('result-score').textContent = s.resultScore(percent);
  document.getElementById('result-desc').textContent = s.descs[cls];
  document.getElementById('restart-btn').textContent = s.restartBtn;
  document.getElementById('t-footer').textContent = s.footer;

  const litBars = Math.max(1, 5 - Math.floor(percent/20));
  const bars = document.querySelectorAll('#result-bars .bar');
  bars.forEach((b,i) => {
    b.className = 'bar' + (i < litBars ? ` lit-${cls}` : '');
  });

  const flagged = answers.filter(a => a.pts >= 2);
  const tipsList = document.getElementById('tips-list');
  const tipsLabelEl = document.getElementById('tips-label');
  tipsList.innerHTML = '';

  if(flagged.length === 0){
    tipsLabelEl.textContent = s.resultLabelOk;
    const p = document.createElement('p');
    p.className = 'ok-msg';
    p.textContent = s.okMsg;
    tipsList.appendChild(p);
  } else {
    tipsLabelEl.textContent = s.tipsLabel;
    const seenIdx = new Set();
    flagged.forEach(a => {
      if(seenIdx.has(a.qIndex)) return;
      seenIdx.add(a.qIndex);
      const div = document.createElement('div');
      div.className = 'tip';
      div.innerHTML = `<span class="dot" style="background:var(--${cls})"></span><span>${QUESTIONS[a.qIndex].tip[currentLang]}</span>`;
      tipsList.appendChild(div);
    });
  }
}

function restart(){
  activeScreen = 'intro';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-intro').style.display = 'block';
}

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});

setLang('kr');

const loaderEl = document.getElementById('loader');
if(loaderEl){
  loaderEl.addEventListener('animationend', () => loaderEl.remove());
}

/* ---------- PWA: install prompt + service worker ---------- */
let deferredInstallPrompt = null;
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
