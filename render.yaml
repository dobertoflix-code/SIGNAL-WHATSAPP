services:
  - type: web
    name: siyal-whatsapp
    runtime: node
    buildCommand: "npm install"
    startCommand: "node server.js"
    pullRequestPreviewsEnabled: false
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: PLAUSIBLE_SHARE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
